[build]
builder = "nixpacks"

[build.nixpacksPlan.phases.setup]
nixPkgs = [
  "python311",
  "libGL",
  "libglib",
  "gcc",
  "zlib"
]

[deploy]
startCommand = "gunicorn wsgi:app --workers 2 --bind 0.0.0.0:$PORT --timeout 120"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
